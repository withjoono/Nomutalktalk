<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노무 AI 대화형 상담 챗봇</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 채팅 전용 스타일 */
        .chat-container {
            max-width: 900px;
            margin: 2rem auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .chat-header .status {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 1.2rem;
            display: flex;
            gap: 0.75rem;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.user .message-avatar {
            background: #4CAF50;
            color: white;
        }

        .message-content {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 18px;
            position: relative;
        }

        .message.ai .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-meta {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            opacity: 0.7;
        }

        .message.ai .message-meta {
            color: #666;
        }

        .message.user .message-meta {
            color: rgba(255,255,255,0.8);
            text-align: right;
        }

        .stage-indicator {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
            color: #555;
        }

        .stage-indicator.diagnosis { background: #e3f2fd; color: #1976d2; }
        .stage-indicator.analysis { background: #fff3e0; color: #f57c00; }
        .stage-indicator.solution { background: #e8f5e9; color: #388e3c; }
        .stage-indicator.followup { background: #f3e5f5; color: #7b1fa2; }

        .chat-input-container {
            padding: 1.5rem;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 24px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 0.4rem;
            padding: 0.75rem 1.25rem;
            background: white;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnimation {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .quick-action-btn {
            padding: 0.5rem 1rem;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .quick-action-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #667eea;
        }

        .welcome-title {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .welcome-description {
            font-size: 1rem;
            color: #666;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .example-queries {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 700px;
        }

        .example-query {
            padding: 1rem;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .example-query:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .example-query-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .example-query-text {
            font-size: 0.9rem;
            color: #555;
        }

        .session-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .new-chat-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>
                <i class="fas fa-balance-scale"></i>
                노무 AI 대화형 상담
            </h1>
            <div class="status">
                <span id="connection-status">🟢 연결됨</span>
                <span id="stage-status" class="stage-indicator diagnosis" style="display:none;">진단 단계</span>
            </div>
            <div class="session-info" id="session-info" style="display:none;">
                <span>세션: <span id="session-id-display">-</span></span>
                <button class="new-chat-btn" onclick="startNewChat()">
                    <i class="fas fa-plus"></i> 새 상담
                </button>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-icon">⚖️</div>
                <h2 class="welcome-title">노무 AI 대화형 상담에 오신 것을 환영합니다</h2>
                <p class="welcome-description">
                    노동법령과 판례를 기반으로 단계별 맞춤 상담을 제공합니다.<br>
                    진단 → 법적 분석 → 대안 제안 → 후속 질문 순으로 체계적으로 도와드립니다.
                </p>
                <div class="example-queries">
                    <div class="example-query" onclick="sendExampleQuery('임금을 3개월째 못 받고 있어요')">
                        <div class="example-query-icon">💰</div>
                        <div class="example-query-text">임금 체불 문제</div>
                    </div>
                    <div class="example-query" onclick="sendExampleQuery('부당하게 해고당했어요')">
                        <div class="example-query-icon">🚫</div>
                        <div class="example-query-text">부당 해고</div>
                    </div>
                    <div class="example-query" onclick="sendExampleQuery('연장근무 수당을 안 줘요')">
                        <div class="example-query-icon">⏰</div>
                        <div class="example-query-text">근로시간 문제</div>
                    </div>
                    <div class="example-query" onclick="sendExampleQuery('연차를 사용할 수 없어요')">
                        <div class="example-query-icon">🌴</div>
                        <div class="example-query-text">휴가 사용 문제</div>
                    </div>
                    <div class="example-query" onclick="sendExampleQuery('업무 중에 다쳤어요')">
                        <div class="example-query-icon">🏥</div>
                        <div class="example-query-text">산업재해</div>
                    </div>
                    <div class="example-query" onclick="sendExampleQuery('회사가 산재 신고를 거부해요')">
                        <div class="example-query-icon">🚨</div>
                        <div class="example-query-text">산재 신고 거부</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="quick-actions" id="quick-actions" style="display:none;"></div>
            <div class="chat-input-wrapper">
                <textarea 
                    id="user-input" 
                    class="chat-input" 
                    placeholder="노무 문제를 자유롭게 말씀해주세요..."
                    rows="1"
                    disabled
                ></textarea>
                <button id="send-button" class="send-button" onclick="sendMessage()" disabled>
                    <i class="fas fa-paper-plane"></i>
                    <span>전송</span>
                </button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
